<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520">
  <style>
    @keyframes type1 { 0%,8%{width:0} 12%,100%{width:340px} }
    @keyframes type2 { 0%,14%{width:0} 18%,100%{width:280px} }
    @keyframes type3 { 0%,20%{width:0} 24%,100%{width:300px} }
    @keyframes type4 { 0%,26%{width:0} 30%,100%{width:260px} }
    @keyframes type5 { 0%,33%{width:0} 37%,100%{width:350px} }
    @keyframes type6 { 0%,40%{width:0} 44%,100%{width:330px} }
    @keyframes type7 { 0%,48%{width:0} 52%,100%{width:390px} }
    @keyframes type8 { 0%,55%{width:0} 59%,100%{width:310px} }
    @keyframes type9 { 0%,62%{width:0} 66%,100%{width:360px} }
    @keyframes type10 { 0%,69%{width:0} 73%,100%{width:300px} }
    @keyframes type11 { 0%,76%{width:0} 80%,100%{width:270px} }
    @keyframes type12 { 0%,83%{width:0} 87%,100%{width:240px} }
    @keyframes type13 { 0%,90%{width:0} 94%,100%{width:230px} }
    @keyframes cursor { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes netPulse1 { 0%,100%{opacity:.3} 50%{opacity:1} }
    @keyframes netPulse2 { 0%,100%{opacity:.2} 40%{opacity:.9} }
    @keyframes dotMove1 { 0%{cx:355} 25%{cx:395} 50%{cx:435} 75%{cx:395} 100%{cx:355} }
    @keyframes dotMove2 { 0%{cx:465} 30%{cx:425} 60%{cx:385} 100%{cx:465} }
    @keyframes dotMove3 { 0%{cy:363} 50%{cy:393} 100%{cy:363} }
    @keyframes dotBounce { 0%,100%{cy:378} 50%{cy:373} }
    @keyframes blockGlow { 0%,100%{stroke:#f0883e;opacity:.5} 50%{stroke:#ffa657;opacity:1} }
    @keyframes statusBlink { 0%,45%,55%,100%{opacity:1} 50%{opacity:0} }
    @keyframes fadeLoop { 0%,30%{opacity:1} 33%,63%{opacity:0} 66%,96%{opacity:1} 100%{opacity:0} }
    @keyframes fadeLoop2 { 0%,30%{opacity:0} 33%,63%{opacity:1} 66%,100%{opacity:0} }
    @keyframes fadeLoop3 { 0%,63%{opacity:0} 66%,96%{opacity:1} 100%{opacity:0} }
    @keyframes scanline { 0%{transform:translateY(-520px)} 100%{transform:translateY(520px)} }
    text{font-family:'Courier New',monospace}
  </style>

  <!-- Terminal background -->
  <rect width="820" height="520" rx="8" fill="#0d1117"/>
  <!-- Title bar -->
  <rect width="820" height="32" rx="8" fill="#161b22"/>
  <rect y="24" width="820" height="8" fill="#161b22"/>
  <circle cx="20" cy="16" r="6" fill="#da3633"/>
  <circle cx="40" cy="16" r="6" fill="#f0883e"/>
  <circle cx="60" cy="16" r="6" fill="#39d353"/>
  <text x="410" y="20" text-anchor="middle" fill="#8b949e" font-size="12">surya@system ~ agents</text>

  <!-- Scanline effect -->
  <rect width="820" height="2" fill="#58a6ff" opacity=".03" style="animation:scanline 8s linear infinite"/>

  <!-- Terminal typed logs -->
  <g>
    <!-- Line 1 -->
    <text x="25" y="60" fill="#8b949e" font-size="13">$</text>
    <svg x="35" y="47" style="overflow:hidden;animation:type1 20s steps(30) infinite">
      <text x="0" y="13" fill="#39d353" font-size="13">./boot_agents --mode=autonomous</text>
    </svg>

    <!-- Line 2 -->
    <svg x="25" y="67" style="overflow:hidden;animation:type2 20s steps(25) infinite">
      <text x="0" y="13" fill="#58a6ff" font-size="12">[ init ] loading swarm protocol v3...</text>
    </svg>

    <!-- Line 3 -->
    <svg x="25" y="87" style="overflow:hidden;animation:type3 20s steps(25) infinite">
      <text x="0" y="13" fill="#58a6ff" font-size="12">[ init ] connecting to chain node...</text>
    </svg>

    <!-- Line 4 -->
    <svg x="25" y="107" style="overflow:hidden;animation:type4 20s steps(20) infinite">
      <text x="0" y="13" fill="#39d353" font-size="12">[ ok ] chain synced :: height 1847</text>
    </svg>

    <!-- Line 5 -->
    <svg x="25" y="132" style="overflow:hidden;animation:type5 20s steps(30) infinite">
      <text x="0" y="13" fill="#f0883e" font-size="12">agent.01 &#x2192; online :: task=mine_block</text>
    </svg>

    <!-- Line 6 -->
    <svg x="25" y="152" style="overflow:hidden;animation:type6 20s steps(28) infinite">
      <text x="0" y="13" fill="#f0883e" font-size="12">agent.02 &#x2192; online :: task=verify_tx</text>
    </svg>

    <!-- Line 7 -->
    <svg x="25" y="172" style="overflow:hidden;animation:type7 20s steps(32) infinite">
      <text x="0" y="13" fill="#f0883e" font-size="12">agent.03 &#x2192; online :: task=legal_compliance</text>
    </svg>

    <!-- Line 8 -->
    <svg x="25" y="192" style="overflow:hidden;animation:type8 20s steps(26) infinite">
      <text x="0" y="13" fill="#f0883e" font-size="12">agent.04 &#x2192; online :: task=negotiate</text>
    </svg>

    <!-- Line 9 -->
    <svg x="25" y="217" style="overflow:hidden;animation:type9 20s steps(30) infinite">
      <text x="0" y="13" fill="#39d353" font-size="12">[ chain ] block #1848 validated &#x2713; consensus</text>
    </svg>

    <!-- Line 10 -->
    <svg x="25" y="237" style="overflow:hidden;animation:type10 20s steps(25) infinite">
      <text x="0" y="13" fill="#58a6ff" font-size="12">[ flow ] data &#x2192; agent.02 &#x2192; chain &#x2192; ok</text>
    </svg>

    <!-- Line 11 -->
    <svg x="25" y="257" style="overflow:hidden;animation:type11 20s steps(22) infinite">
      <text x="0" y="13" fill="#58a6ff" font-size="12">[ flow ] agent.03 &#x2192; audit &#x2192; passed</text>
    </svg>

    <!-- Line 12 -->
    <svg x="25" y="277" style="overflow:hidden;animation:type12 20s steps(20) infinite">
      <text x="0" y="13" fill="#39d353" font-size="12">[ swarm ] negotiation complete</text>
    </svg>

    <!-- Line 13 -->
    <svg x="25" y="297" style="overflow:hidden;animation:type13 20s steps(18) infinite">
      <text x="0" y="13" fill="#8b949e" font-size="12">[ status ] autonomous &#x2588;</text>
    </svg>

    <!-- Blinking cursor -->
    <rect x="240" y="290" width="8" height="14" fill="#39d353" style="animation:cursor 1s step-end infinite"/>
  </g>

  <!-- Network visualization area -->
  <line x1="0" y1="330" x2="820" y2="330" stroke="#21262d" stroke-width="1"/>
  <text x="25" y="350" fill="#484f58" font-size="10">NETWORK MAP</text>

  <!-- Network nodes -->
  <!-- Agent dots moving -->
  <circle r="5" fill="#58a6ff" style="animation:dotMove1 4s ease-in-out infinite">
    <animate attributeName="cy" values="378;373;378" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="5" fill="#58a6ff" style="animation:dotMove2 5s ease-in-out infinite">
    <animate attributeName="cy" values="378;383;378" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" r="4" fill="#39d353" style="animation:dotBounce 3s ease-in-out infinite">
    <animate attributeName="cx" values="300;340;300" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" r="4" fill="#da3633">
    <animate attributeName="cx" values="500;460;500" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="378;370;385;378" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Static anchor nodes -->
  <circle cx="200" cy="378" r="3" fill="#8b949e" style="animation:netPulse1 3s infinite"/>
  <circle cx="600" cy="378" r="3" fill="#8b949e" style="animation:netPulse1 4s infinite"/>
  <circle cx="150" cy="395" r="2" fill="#8b949e" style="animation:netPulse2 5s infinite"/>
  <circle cx="650" cy="365" r="2" fill="#8b949e" style="animation:netPulse2 3.5s infinite"/>

  <!-- Central chain block -->
  <rect x="385" y="365" width="50" height="26" rx="3" fill="#0d1117" stroke="#f0883e" stroke-width="1.5" style="animation:blockGlow 3s infinite"/>
  <text x="410" y="382" text-anchor="middle" fill="#f0883e" font-size="10">[#]</text>

  <!-- Connection lines pulsing -->
  <line x1="200" y1="378" x2="385" y2="378" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,5" style="animation:netPulse1 2.5s infinite"/>
  <line x1="435" y1="378" x2="600" y2="378" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,5" style="animation:netPulse2 3s infinite"/>
  <line x1="150" y1="395" x2="385" y2="380" stroke="#8b949e" stroke-width=".5" stroke-dasharray="2,4" style="animation:netPulse2 4s infinite"/>
  <line x1="435" y1="376" x2="650" y2="365" stroke="#8b949e" stroke-width=".5" stroke-dasharray="2,4" style="animation:netPulse1 3.5s infinite"/>

  <!-- Data packets flowing to chain -->
  <circle r="2" fill="#39d353">
    <animateMotion dur="2s" repeatCount="indefinite" path="M200,378 L385,378"/>
  </circle>
  <circle r="2" fill="#39d353">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M600,378 L435,378"/>
  </circle>
  <circle r="1.5" fill="#f0883e">
    <animateMotion dur="3s" repeatCount="indefinite" path="M410,365 L410,340"/>
  </circle>

  <!-- Node labels -->
  <text x="200" y="405" text-anchor="middle" fill="#484f58" font-size="8" style="animation:netPulse1 4s infinite">&#x25CF; node</text>
  <text x="600" y="405" text-anchor="middle" fill="#484f58" font-size="8" style="animation:netPulse1 5s infinite">&#x25CF; node</text>
  <text x="410" y="405" text-anchor="middle" fill="#f0883e" font-size="8" style="animation:netPulse1 3s infinite">&#x26D3; chain</text>

  <!-- Bottom status bar -->
  <rect y="430" width="820" height="90" fill="#0d1117"/>
  <line x1="0" y1="430" x2="820" y2="430" stroke="#21262d" stroke-width="1"/>

  <!-- Cycling taglines -->
  <text x="410" y="460" text-anchor="middle" fill="#c9d1d9" font-size="14" font-weight="bold" style="animation:fadeLoop 12s infinite">
    Building agentic workflows and autonomous systems
  </text>
  <text x="410" y="460" text-anchor="middle" fill="#c9d1d9" font-size="14" font-weight="bold" style="animation:fadeLoop2 12s infinite">
    Working across AI, blockchain, and the legal space
  </text>
  <text x="410" y="460" text-anchor="middle" fill="#c9d1d9" font-size="14" font-weight="bold" style="animation:fadeLoop3 12s infinite">
    Just trying to make systems that think and act
  </text>

  <!-- Status indicators -->
  <g transform="translate(0,480)">
    <circle cx="120" cy="10" r="4" fill="#39d353" style="animation:statusBlink 2s infinite"/>
    <text x="130" y="14" fill="#484f58" font-size="10">agents: running</text>

    <circle cx="310" cy="10" r="4" fill="#39d353" style="animation:statusBlink 3s infinite"/>
    <text x="320" y="14" fill="#484f58" font-size="10">chain: synced</text>

    <circle cx="480" cy="10" r="4" fill="#39d353" style="animation:statusBlink 2.5s infinite"/>
    <text x="490" y="14" fill="#484f58" font-size="10">consensus: stable</text>

    <circle cx="670" cy="10" r="4" fill="#58a6ff" style="animation:statusBlink 1.5s infinite"/>
    <text x="680" y="14" fill="#484f58" font-size="10">mode: autonomous</text>
  </g>
</svg>
