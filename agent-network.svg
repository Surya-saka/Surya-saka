<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <style>
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
    @keyframes pulse2 { 0%,100%{opacity:.2} 50%{opacity:.8} }
    @keyframes pulse3 { 0%,100%{opacity:.4} 30%{opacity:1} 70%{opacity:.6} }
    @keyframes blink { 0%,48%,52%,100%{opacity:1} 50%{opacity:0} }
    @keyframes glow { 0%,100%{fill:#0d1117;stroke:#58a6ff} 50%{fill:#0d1117;stroke:#79c0ff} }
    @keyframes chainGlow { 0%,100%{stroke:#8b949e;opacity:.5} 50%{stroke:#58a6ff;opacity:1} }
    @keyframes textFade1 { 0%,30%{opacity:1} 33%,100%{opacity:0} }
    @keyframes textFade2 { 0%,33%{opacity:0} 36%,63%{opacity:1} 66%,100%{opacity:0} }
    @keyframes textFade3 { 0%,66%{opacity:0} 69%,96%{opacity:1} 100%{opacity:0} }
    @keyframes nodeFloat1 { 0%,100%{transform:translate(0,0)} 25%{transform:translate(3px,-4px)} 50%{transform:translate(-2px,3px)} 75%{transform:translate(4px,2px)} }
    @keyframes nodeFloat2 { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-4px,3px)} 50%{transform:translate(3px,-2px)} 75%{transform:translate(-2px,-3px)} }
    @keyframes dataStream { 0%{stroke-dashoffset:20} 100%{stroke-dashoffset:0} }
    @keyframes ripple { 0%{r:2;opacity:.8} 100%{r:15;opacity:0} }
    text { font-family: 'Courier New', monospace; }
  </style>
  
  <rect width="800" height="400" fill="#0d1117"/>
  
  <!-- Subtle grid -->
  <g opacity=".04" stroke="#58a6ff">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- Connection lines between agents - flickering -->
  <g stroke-width="1" fill="none" stroke-dasharray="4,4">
    <line x1="120" y1="120" x2="280" y2="100" stroke="#58a6ff" opacity=".3" style="animation:pulse 3s infinite"/>
    <line x1="120" y1="120" x2="180" y2="250" stroke="#58a6ff" opacity=".2" style="animation:pulse2 4s infinite"/>
    <line x1="280" y1="100" x2="400" y2="180" stroke="#58a6ff" opacity=".3" style="animation:pulse 5s infinite"/>
    <line x1="520" y1="110" x2="400" y2="180" stroke="#58a6ff" opacity=".2" style="animation:pulse2 3.5s infinite"/>
    <line x1="520" y1="110" x2="660" y2="140" stroke="#58a6ff" opacity=".3" style="animation:pulse 4.5s infinite"/>
    <line x1="660" y1="140" x2="620" y2="270" stroke="#58a6ff" opacity=".2" style="animation:pulse2 3s infinite"/>
    <line x1="180" y1="250" x2="350" y2="290" stroke="#58a6ff" opacity=".3" style="animation:pulse 3.8s infinite"/>
    <line x1="350" y1="290" x2="480" y2="270" stroke="#58a6ff" opacity=".2" style="animation:pulse2 4.2s infinite"/>
    <line x1="480" y1="270" x2="620" y2="270" stroke="#58a6ff" opacity=".3" style="animation:pulse 3.2s infinite"/>
    <line x1="280" y1="100" x2="520" y2="110" stroke="#8b949e" opacity=".15" style="animation:pulse3 6s infinite"/>
    <line x1="180" y1="250" x2="480" y2="270" stroke="#8b949e" opacity=".1" style="animation:pulse 7s infinite"/>
  </g>

  <!-- Data flow lines - animated dashes -->
  <g stroke-width="1.5" fill="none" stroke-dasharray="3,6" style="animation:dataStream 1s linear infinite">
    <line x1="120" y1="125" x2="390" y2="180" stroke="#39d353" opacity=".4"/>
    <line x1="520" y1="115" x2="410" y2="180" stroke="#39d353" opacity=".3"/>
    <line x1="350" y1="285" x2="400" y2="200" stroke="#39d353" opacity=".35"/>
  </g>

  <!-- Flowing data packets -->
  <circle r="2" fill="#58a6ff">
    <animateMotion dur="3s" repeatCount="indefinite" path="M120,120 Q200,80 280,100"/>
  </circle>
  <circle r="2" fill="#39d353">
    <animateMotion dur="4s" repeatCount="indefinite" path="M280,100 Q340,140 400,180"/>
  </circle>
  <circle r="2" fill="#58a6ff">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M520,110 Q460,140 400,180"/>
  </circle>
  <circle r="1.5" fill="#da3633">
    <animateMotion dur="4s" repeatCount="indefinite" path="M660,140 Q640,200 620,270"/>
  </circle>
  <circle r="1.5" fill="#39d353">
    <animateMotion dur="3s" repeatCount="indefinite" path="M180,250 Q265,270 350,290"/>
  </circle>
  <circle r="2" fill="#58a6ff">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M350,290 Q415,280 480,270"/>
  </circle>
  <circle r="1.5" fill="#f0883e">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M480,270 Q550,270 620,270"/>
  </circle>
  <circle r="2" fill="#39d353">
    <animateMotion dur="5s" repeatCount="indefinite" path="M120,120 Q150,185 180,250"/>
  </circle>

  <!-- Ripple effects at central chain -->
  <circle cx="400" cy="190" fill="none" stroke="#58a6ff" style="animation:ripple 3s infinite"/>
  <circle cx="400" cy="190" fill="none" stroke="#58a6ff" style="animation:ripple 3s infinite 1s"/>
  <circle cx="400" cy="190" fill="none" stroke="#58a6ff" style="animation:ripple 3s infinite 2s"/>

  <!-- Agent nodes - floating -->
  <g style="animation:nodeFloat1 8s ease-in-out infinite">
    <circle cx="120" cy="120" r="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5" style="animation:glow 4s infinite"/>
    <text x="120" y="124" text-anchor="middle" fill="#58a6ff" font-size="9">&#x26A1;</text>
    <text x="120" y="145" text-anchor="middle" fill="#8b949e" font-size="8" style="animation:pulse 3s infinite">agent.01</text>
  </g>

  <g style="animation:nodeFloat2 7s ease-in-out infinite">
    <circle cx="280" cy="100" r="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5" style="animation:glow 5s infinite"/>
    <text x="280" y="104" text-anchor="middle" fill="#58a6ff" font-size="9">&#x26A1;</text>
    <text x="280" y="125" text-anchor="middle" fill="#8b949e" font-size="8" style="animation:pulse2 4s infinite">agent.02</text>
  </g>

  <g style="animation:nodeFloat1 9s ease-in-out infinite">
    <circle cx="520" cy="110" r="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5" style="animation:glow 3.5s infinite"/>
    <text x="520" y="114" text-anchor="middle" fill="#58a6ff" font-size="9">&#x26A1;</text>
    <text x="520" y="135" text-anchor="middle" fill="#8b949e" font-size="8" style="animation:pulse 5s infinite">agent.03</text>
  </g>

  <g style="animation:nodeFloat2 6s ease-in-out infinite">
    <circle cx="660" cy="140" r="8" fill="#0d1117" stroke="#39d353" stroke-width="1.5" style="animation:glow 4.5s infinite"/>
    <text x="660" y="144" text-anchor="middle" fill="#39d353" font-size="9">&#x25C8;</text>
    <text x="660" y="165" text-anchor="middle" fill="#8b949e" font-size="8" style="animation:pulse2 3.5s infinite">miner.01</text>
  </g>

  <g style="animation:nodeFloat1 7.5s ease-in-out infinite">
    <circle cx="180" cy="250" r="8" fill="#0d1117" stroke="#39d353" stroke-width="1.5" style="animation:glow 3s infinite"/>
    <text x="180" y="254" text-anchor="middle" fill="#39d353" font-size="9">&#x25C8;</text>
    <text x="180" y="275" text-anchor="middle" fill="#8b949e" font-size="8" style="animation:pulse 4s infinite">miner.02</text>
  </g>

  <g style="animation:nodeFloat2 8.5s ease-in-out infinite">
    <circle cx="480" cy="270" r="8" fill="#0d1117" stroke="#da3633" stroke-width="1.5" style="animation:glow 5s infinite"/>
    <text x="480" y="274" text-anchor="middle" fill="#da3633" font-size="9">&#x2696;</text>
    <text x="480" y="295" text-anchor="middle" fill="#8b949e" font-size="8" style="animation:pulse2 3s infinite">legal.01</text>
  </g>

  <g style="animation:nodeFloat1 6.5s ease-in-out infinite">
    <circle cx="620" cy="270" r="8" fill="#0d1117" stroke="#da3633" stroke-width="1.5" style="animation:glow 4s infinite"/>
    <text x="620" y="274" text-anchor="middle" fill="#da3633" font-size="9">&#x2696;</text>
    <text x="620" y="295" text-anchor="middle" fill="#8b949e" font-size="8" style="animation:pulse 4.5s infinite">legal.02</text>
  </g>

  <g style="animation:nodeFloat2 7s ease-in-out infinite">
    <circle cx="350" cy="290" r="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5" style="animation:glow 3.5s infinite"/>
    <text x="350" y="294" text-anchor="middle" fill="#58a6ff" font-size="9">&#x26A1;</text>
    <text x="350" y="315" text-anchor="middle" fill="#8b949e" font-size="8" style="animation:pulse3 5s infinite">agent.04</text>
  </g>

  <!-- Central blockchain structure -->
  <g style="animation:pulse3 4s infinite">
    <rect x="375" y="160" width="50" height="14" rx="2" fill="#0d1117" stroke="#f0883e" stroke-width="1" style="animation:chainGlow 3s infinite"/>
    <text x="400" y="170" text-anchor="middle" fill="#f0883e" font-size="7">&#x25C8; BLK.7</text>
  </g>
  <g style="animation:pulse3 4s infinite .3s">
    <rect x="375" y="176" width="50" height="14" rx="2" fill="#0d1117" stroke="#f0883e" stroke-width="1" style="animation:chainGlow 3s infinite .5s"/>
    <text x="400" y="186" text-anchor="middle" fill="#f0883e" font-size="7">&#x25C8; BLK.8</text>
  </g>
  <g style="animation:pulse3 4s infinite .6s">
    <rect x="375" y="192" width="50" height="14" rx="2" fill="#0d1117" stroke="#f0883e" stroke-width="1" style="animation:chainGlow 3s infinite 1s"/>
    <text x="400" y="202" text-anchor="middle" fill="#f0883e" font-size="7">&#x25C8; BLK.9</text>
  </g>
  <g style="animation:pulse3 4s infinite .9s">
    <rect x="375" y="208" width="50" height="14" rx="2" fill="#0d1117" stroke="#39d353" stroke-width="1.5" style="animation:chainGlow 2s infinite"/>
    <text x="400" y="218" text-anchor="middle" fill="#39d353" font-size="7">+ NEW &#x25C8;</text>
  </g>

  <!-- Fading overlay text -->
  <g>
    <text x="400" y="355" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold" style="animation:textFade1 9s infinite">
      agentic workflows
    </text>
    <text x="400" y="355" text-anchor="middle" fill="#39d353" font-size="13" font-weight="bold" style="animation:textFade2 9s infinite">
      autonomous systems
    </text>
    <text x="400" y="355" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="bold" style="animation:textFade3 9s infinite">
      AI &#xD7; blockchain &#xD7; legal
    </text>
  </g>

  <!-- Network status line -->
  <text x="400" y="375" text-anchor="middle" fill="#484f58" font-size="9" style="animation:pulse 4s infinite">
    &#x25CF; 8 nodes active &#xB7; 12 connections &#xB7; consensus: stable &#xB7; chain: synced
  </text>

  <!-- Corner decorations -->
  <text x="15" y="20" fill="#484f58" font-size="9" style="animation:blink 4s infinite">&#x25B8; sys.network.alive</text>
  <text x="620" y="20" fill="#484f58" font-size="9" style="animation:pulse2 5s infinite">&#x27E8; swarm.protocol.v3 &#x27E9;</text>
  <text x="15" y="390" fill="#484f58" font-size="9" style="animation:pulse 6s infinite">&#x27E8; chain.height: 1847 &#x27E9;</text>
  <text x="640" y="390" fill="#484f58" font-size="9" style="animation:blink 5s infinite">&#x25B8; consensus.ok</text>
</svg>
